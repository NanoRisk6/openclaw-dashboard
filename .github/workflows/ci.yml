name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Smoke test config and app boot
        run: |
          node -e "const { loadConfig } = require('./src/config'); const c = loadConfig(); if (!c.server || !c.collector) throw new Error('config failed'); console.log('config-ok');"
          node -e "const { createBundledCodexPlugin } = require('./src/plugins/codex'); const { loadConfig } = require('./src/config'); const plugin = createBundledCodexPlugin(loadConfig()); if (!plugin || plugin.id !== 'bundled-codex') throw new Error('plugin failed'); console.log('plugin-ok');"
          node -e "const { createApp } = require('./src/server/app'); const { loadConfig } = require('./src/config'); const { createBundledCodexPlugin } = require('./src/plugins/codex'); const config = loadConfig(); config.plugins = { codex: createBundledCodexPlugin(config) }; const app = createApp(config); if (typeof app.get !== 'function') throw new Error('app failed'); console.log('app-ok');"
